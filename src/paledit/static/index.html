<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PalEdit</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <header><div><span class="logo">P</span><strong>PalEdit</strong></div><span class="badge">macOS · 本地模式</span></header>
  <main>
    <section class="hero">
      <p class="eyebrow">PALWORLD 1.0 SAVE WORKBENCH</p>
      <h1>先确认存档健康，<br>再安全地修改。</h1>
      <p>所有分析与修改都在这台 Mac 上完成。每次写入前自动备份，并使用 Palworld 原始数据格式。</p>
    </section>
    <section class="panel">
      <div class="panel-head"><div><h2>服务器世界</h2><p id="root">正在发现 Save 目录…</p></div><button id="refresh">重新扫描</button></div>
      <div id="worlds" class="worlds"><div class="empty">正在读取存档头…</div></div>
    </section>
    <section id="user-panel" class="panel item-panel hidden">
      <div class="panel-head"><div><h2>当前存档用户</h2><p id="user-summary">选择世界后加载用户</p></div><button id="reload-users">重新读取</button></div>
      <div class="user-layout"><nav id="users" class="user-nav"></nav><section id="player-detail" class="player-detail"><div class="empty">从左侧选择用户</div></section></div>
    </section>
    <details class="reference-panel"><summary>内部 ID 中文参考</summary><section class="panel item-panel">
      <div class="panel-head"><div><h2>道具 ID 中文索引</h2><p id="item-summary">正在加载 1.0 道具数据…</p></div></div>
      <label class="search"><span>搜索</span><input id="item-query" type="search" placeholder="输入中文名称或内部 ID，例如：帕鲁球 / PalSphere"></label>
      <div id="item-results" class="item-results"></div>
    </section>
    <section class="panel item-panel">
      <div class="panel-head"><div><h2>帕鲁 CharacterID 中文索引</h2><p id="pal-summary">正在加载 1.0 帕鲁数据…</p></div></div>
      <label class="search"><span>搜索</span><input id="pal-query" type="search" placeholder="输入中文名称或 CharacterID，例如：棉悠悠 / SheepBall"></label>
      <div id="pal-results" class="item-results"></div>
    </section></details>
  </main>
  <template id="world-template">
    <article class="world-card">
      <div class="world-main"><span class="status"></span><div><h3></h3><p class="meta"></p></div></div>
      <div class="facts"><span class="format"></span><span class="players"></span><span class="backups"></span></div>
      <div class="actions"><button class="inspect">执行 1.0 深度诊断</button><span class="result">尚未诊断</span></div>
    </article>
  </template>
  <template id="item-template">
    <button class="item-row"><span class="item-name"></span><code class="item-id"></code><span class="localization"></span></button>
  </template>
  <template id="user-template">
    <article class="user-card">
      <div class="user-title"><div><h3 class="user-name"></h3><code class="user-id"></code></div><span class="pal-count"></span></div>
      <div class="detail-tabs"><button data-tab="profile" class="active">基础资料</button><button data-tab="inventory">背包道具</button><button data-tab="pals">拥有的帕鲁</button></div>
      <form class="user-form tab-pane" data-pane="profile">
        <label>用户昵称<input name="nickname" maxlength="64"></label>
        <label>等级<input name="level" type="number" min="1" max="100"></label>
        <label>经验值<input name="experience" type="number" min="0"></label>
        <label>未分配属性点<input name="unused_status_points" type="number" min="0" max="65535"></label>
        <label>饱食度<input name="satiety" type="number" min="0" max="100" step="0.01"></label>
        <div class="readonly-data"></div>
        <button type="submit" class="save-user">备份并保存</button>
        <span class="save-result"></span>
      </form>
      <section class="inventory-list tab-pane hidden" data-pane="inventory"></section>
      <section class="pal-list tab-pane hidden" data-pane="pals"><div></div></section>
    </article>
  </template>
  <script src="/assets/app.js"></script>
</body>
</html>
