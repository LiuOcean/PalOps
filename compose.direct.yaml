services:
  palops:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: palops
    restart: unless-stopped
    working_dir: /state
    ports:
      - "${PALOPS_BIND_ADDRESS:-${PALEDIT_BIND_ADDRESS:-0.0.0.0}}:18765:18765"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - palops-state:/state
      - "${PALWORLD_SERVICE_ROOT:-/srv/palworld}:${PALWORLD_SERVICE_ROOT:-/srv/palworld}"
      - "${PALWORLD_SAVE_ROOT:-/srv/palworld/Pal/Saved}:${PALWORLD_SAVE_ROOT:-/srv/palworld/Pal/Saved}:ro"
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  palops-state:
